<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEBS - Dashboard</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .dashboard-container {
            display: flex;
            max-width: 1200px;
            margin: 3rem auto;
            gap: 2rem;
        }

        .sidebar {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 12px;
            width: 250px;
            flex-shrink: 0;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar h3 {
            margin-bottom: 1.5rem;
            color: var(--primary-color);
        }

        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .sidebar-links a {
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            cursor: pointer;
            padding: 0.5rem 1rem;
            border-radius: 6px;
            transition: all 0.3s ease;
        }

        .sidebar-links a:hover,
        .sidebar-links a.active {
            background: rgba(99, 102, 241, 0.2);
            color: var(--primary-color);
        }

        .dashboard-content {
            flex-grow: 1;
            background: var(--card-bg);
            padding: 2.5rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }

        .data-table th,
        .data-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .data-table th {
            color: var(--primary-color);
        }

        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 99px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-confirmed,
        .status-approved {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }

        .status-cancelled,
        .status-rejected {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.2);
            color: #fbbf24;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1.5rem;
        }

        .form-group label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        textarea {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.875rem 1rem;
            border-radius: 8px;
            color: white;
            outline: none;
            transition: border-color 0.3s ease;
            resize: vertical;
            min-height: 100px;
        }

        textarea:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2);
        }
    </style>
</head>

<body>
    <nav class="navbar">
        <div class="logo">VisionX Events</div>
        <div class="nav-links">
            <a href="index.html" class="btn btn-outline">Back to Home</a>
        </div>
    </nav>

    <div class="dashboard-container">
        <aside class="sidebar">
            <h3 id="user-greeting">Loading...</h3>
            <div class="sidebar-links" id="sidebar-links">
                <!-- Dynamically populated based on role -->
            </div>
        </aside>

        <main class="dashboard-content">
            <!-- Loading State -->
            <div id="content-loading" style="text-align: center; color: var(--text-secondary);">Loading data...</div>

            <!-- Profile Overview (All Roles) -->
            <div id="view-profile" class="hidden">
                <h2>My Profile</h2>
                <div style="margin-top: 1.5rem; color: var(--text-secondary);" id="profile-info"></div>
            </div>

            <!-- Standard User: My Bookings -->
            <div id="view-bookings" class="hidden">
                <h2>My Bookings</h2>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Event</th>
                            <th>Date</th>
                            <th>Tickets</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="bookings-table-body"></tbody>
                </table>
            </div>

            <!-- Organizer: My Events -->
            <div id="view-my-events" class="hidden">
                <h2>My Managed Events</h2>
                <button class="btn btn-primary" onclick="showView('view-create-event')" style="margin-bottom: 1rem;">+
                    Create New Event</button>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Title</th>
                            <th>Date</th>
                            <th>Capacity</th>
                            <th>Status</th>
                        </tr>
                    </thead>
                    <tbody id="my-events-table-body"></tbody>
                </table>
            </div>

            <!-- Organizer: Create Event Form -->
            <div id="view-create-event" class="hidden">
                <h2>Create New Event</h2>
                <form id="create-event-form" style="margin-top: 1.5rem;">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" id="ev-title" required>
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="ev-desc" required></textarea>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex:1;"><label>Category</label><input type="text"
                                id="ev-category" value="conference" required></div>
                        <div class="form-group" style="flex:1;"><label>Price ($)</label><input type="number"
                                id="ev-price" min="0" value="0" required></div>
                        <div class="form-group" style="flex:1;"><label>Capacity</label><input type="number"
                                id="ev-capacity" min="1" value="100" required></div>
                    </div>
                    <div style="display: flex; gap: 1rem;">
                        <div class="form-group" style="flex:1;"><label>Start Date</label><input type="datetime-local"
                                id="ev-start" required></div>
                        <div class="form-group" style="flex:1;"><label>End Date</label><input type="datetime-local"
                                id="ev-end" required></div>
                    </div>
                    <div class="form-group">
                        <label>Venue / Location</label>
                        <input type="text" id="ev-venue" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Create Event</button>
                    <p id="create-event-message" class="error-text hidden" style="margin-top: 1rem;"></p>
                </form>
            </div>

        </main>
    </div>

    <script src="dashboard.js"></script>
</body>

</html>
