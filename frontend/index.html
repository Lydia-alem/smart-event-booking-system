<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Booking</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <nav class="navbar">
        <div class="logo">VisionX Events</div>
        <div class="nav-links">
            <a href="#" id="nav-home">Home</a>
            <a href="#" id="nav-login" class="btn btn-outline">Login</a>
            <a href="#" id="nav-register" class="btn btn-primary">Register</a>
            <a href="dashboard.html" id="nav-dashboard" class="btn btn-primary hidden">My Dashboard</a>
            <a href="#" id="nav-logout" class="btn btn-outline hidden">Logout</a>
        </div>
    </nav>

    <header class="hero">
        <h1>Discover and Book Amazing Events</h1>
        <p>Your portal to the best experiences powered by VisionX technology.</p>
    </header>

    <main class="container">
        <section class="events-section">
            <h2>Upcoming Events</h2>
            <div class="filters-container" style="display: flex; gap: 1rem; margin-bottom: 2rem;">
                <input type="text" id="search-input" placeholder="Search events..." style="flex: 1;">
                <select id="category-filter" style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 0.875rem 1rem; border-radius: 8px; color: white; outline: none; transition: border-color 0.3s ease;">
                    <option value="">All Categories</option>
                    <option value="conference">Conference</option>
                    <option value="workshop">Workshop</option>
                    <option value="concert">Concert</option>
                    <option value="other">Other</option>
                </select>
            </div>
            <div id="events-grid" class="events-grid">
                <!-- Event cards will be dynamically injected here -->
            </div>
        </section>
    </main>

    <!-- Login Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal">&times;</span>
            <h2 id="modal-title">Login</h2>
            <form id="auth-form">
                <input type="email" id="email" placeholder="Email" required autocomplete="email">
                <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
            <p id="auth-error" class="error-text hidden"></p>
            <div style="margin-top: 1rem; text-align: center;">
                <a href="#" id="forgot-password-link" style="color: var(--primary-color); text-decoration: none; font-size: 0.9rem;">Forgot Password?</a>
            </div>
        </div>
    </div>

    <!-- Register Modal -->
    <div id="register-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-register">&times;</span>
            <h2>Create Account</h2>
            <form id="register-form">
                <div style="display: flex; gap: 1rem;">
                    <input type="text" id="reg-firstName" placeholder="First Name" required>
                    <input type="text" id="reg-lastName" placeholder="Last Name" required>
                </div>
                <input type="email" id="reg-email" placeholder="Email" required>
                <input type="password" id="reg-password" placeholder="Password" required>
                <select id="reg-role" required
                    style="background: rgba(15, 23, 42, 0.5); border: 1px solid rgba(255,255,255,0.1); padding: 0.875rem 1rem; border-radius: 8px; color: white; outline: none; transition: border-color 0.3s ease;">
                    <option value="user">Standard User</option>
                    <option value="organizer">Event Organizer</option>
                </select>
                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p id="register-error" class="error-text hidden"></p>
        </div>
    </div>

    <!-- Password Recovery Modal -->
    <div id="recovery-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-recovery">&times;</span>
            <h2>Recover Password</h2>
            <form id="recovery-form">
                <input type="email" id="recovery-email" placeholder="Enter your email" required autocomplete="email">
                <button type="submit" class="btn btn-primary" style="margin-top: 1rem;">Send Reset Link</button>
            </form>
            <p id="recovery-message" class="error-text hidden"></p>
        </div>
    </div>

    <!-- Event Details Modal -->
    <div id="event-details-modal" class="modal hidden">
        <div class="modal-content" style="max-width: 600px;">
            <span class="close-modal" id="close-event-details">&times;</span>
            <h2 id="detail-title" style="color: var(--primary-color); margin-bottom: 0.5rem;">Event Title</h2>
            <div style="display: flex; gap: 1rem; margin-bottom: 1rem; color: var(--text-secondary); font-size: 0.9rem;">
                <span id="detail-date"></span>
                <span id="detail-status" class="status-badge"></span>
            </div>
            <p id="detail-desc" style="margin-bottom: 1.5rem; line-height: 1.6;"></p>
            <div style="margin-bottom: 1.5rem;">
                <strong>Category:</strong> <span id="detail-category"></span><br>
                <strong>Venue:</strong> <span id="detail-venue"></span><br>
                <strong>Price:</strong> <span id="detail-price" style="color: #34d399; font-weight: bold;"></span>
            </div>
            
            <div id="detail-reviews" style="margin-bottom: 1.5rem;">
                <!-- Reviews will go here -->
            </div>

            <button class="btn btn-primary" id="btn-open-booking" style="width: 100%;">Book Tickets Now</button>
        </div>
    </div>

    <!-- Booking Modal -->
    <div id="booking-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close-modal" id="close-booking">&times;</span>
            <h2>Book Event</h2>
            <form id="booking-form">
                <p id="booking-event-title"
                    style="margin-bottom: 1rem; color: var(--primary-color); font-weight: bold;"></p>
                <input type="number" id="tickets" min="1" max="10" placeholder="Number of Tickets" required
                    style="margin-bottom: 1rem; width: 100%; background: rgba(0,0,0,0.2); border: 1px solid rgba(255,255,255,0.1); padding: 0.75rem 1rem; border-radius: 6px; color: white;">
                <button type="submit" class="btn btn-primary" style="width: 100%">Confirm Booking</button>
            </form>
            <p id="booking-message" class="error-text hidden"></p>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
